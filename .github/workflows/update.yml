name: DSTWR Auto-Sync (Manual Only)

on:
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        id: setup-python # تعريف الـ ID هنا ضروري
        with:
          python-version: '3.9'
          cache: 'pip' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Final Engine
        run: python main.py
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          SPORTMONKS_KEY: ${{ secrets.SPORTMONKS_KEY }}
