name: DSTWR Auto-Sync (Manual Only)

on:
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          # تأكد أن الكاش يعمل بناءً على ملف المتطلبات
          cache: 'pip' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # إضافة شرط التأكد: إذا كان الكاش موجوداً، لن يستغرق هذا الأمر وقتاً
          pip install -r requirements.txt
        # هذا الجزء يضمن عدم تكرار التثبيت بلا داعٍ
        if: steps.cache-pip.outputs.cache-hit != 'true'
