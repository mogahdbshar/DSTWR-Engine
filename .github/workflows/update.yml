name: DSTWR Auto-Sync

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */12 * * *' # تشغيل تلقائي هادئ كل 12 ساعة بدون إزعاج

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Ultra Engine
        run: python main.py
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ISPORTS_KEY: ${{ secrets.ISPORTS_KEY }}
          SPORTMONKS_KEY: ${{ secrets.SPORTMONKS_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
