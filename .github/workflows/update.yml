name: DSTWR Auto-Sync (Manual Only)

on:
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        id: setup-python
        with:
          python-version: '3.9'
          cache: 'pip' # الكاش مفعّل هنا تلقائياً بذكاء من جيت هاب

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ultra Engine
        run: python main.py
        env:
          # تمرير كل المفاتيح إجبارياً للسكربت لقراءة البيانات وصناعة القاعدة الضخمة
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SPORTMONKS_KEY: ${{ secrets.SPORTMONKS_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          ISPORTS_KEY: ${{ secrets.ISPORTS_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
