name: DSTWR Auto-Sync

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/10 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Engine
        run: python main.py
        env:
          ISPORTS_KEY: ${{ secrets.ISPORTS_KEY }}
          SPORTMONKS_KEY: ${{ secrets.SPORTMONKS_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}

      - name: Push to Data Repo
        run: |
          git config --global user.name 'DSTWR-Bot'
          git config --global user.email 'bot@dstwr.com'
          git clone https://${{ secrets.GH_TOKEN }}@github.com/mogahdbshar/DSTWR-Data.git
          cp live_data.json DSTWR-Data/
          cd DSTWR-Data
          git add live_data.json
          git commit -m "Update live data [Automated]" || echo "No changes to commit"
          git push
