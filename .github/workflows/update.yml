name: DSTWR Auto-Sync
on:
  schedule:
    - cron: '*/10 * * * *' 
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Run Engine
        run: |
          python main.py
        env:
          ISPORTS_KEY: ${{ secrets.ISPORTS_KEY }}
          SPORTMONKS_KEY: ${{ secrets.SPORTMONKS_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}

      - name: Push to Data Repo
        run: |
          git config --global user.name 'DSTWR-Bot'
          git config --global user.email 'bot@dstwr.com'
          # استخدام اليوزر نيم الخاص بك للربط
          git clone https://${{ secrets.GH_TOKEN }}@github.com/mogahdbshar/DSTWR-Data.git
          cp live_data.json DSTWR-Data/
          cd DSTWR-Data
          git add .
          git commit -m "Update live data [Automated]"
          git push
