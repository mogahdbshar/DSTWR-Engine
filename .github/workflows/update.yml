name: DSTWR Auto-Sync (Manual Only)

on:
  workflow_dispatch:  # تشغيل يدوي فقط من خلال الـ UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies (Full Data Stack)
        run: |
          pip install requests
          pip install pandas
          pip install numpy
          pip install python-dateutil
          pip install pytz
          pip install sqlalchemy
          pip install psycopg2-binary
          pip install supabase
          pip install sportmonks
          pip install python-dotenv
          pip install tqdm
          pip install beautifulsoup4
          pip install lxml
          pip install requests-cache
          pip install tenacity
          pip install loguru

      - name: Run Ultra Engine (Full Football Archive)
        run: python main.py
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ISPORTS_KEY: ${{ secrets.ISPORTS_KEY }}
          SPORTMONKS_KEY: ${{ secrets.SPORTMONKS_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
