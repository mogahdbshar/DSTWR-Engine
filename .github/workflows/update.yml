name: DSTWR Auto-Sync (Manual Only)

on:
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip' # هذه الإضافة ستحفظ المكتبات وتجعل التنفيذ سريعاً جداً

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt # سيقوم بالتحميل مرة واحدة فقط

      - name: Run Ultra Engine
        run: python main.py
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ISPORTS_KEY: ${{ secrets.ISPORTS_KEY }}
          SPORTMONKS_KEY: ${{ secrets.SPORTMONKS_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          
